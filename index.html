<!DOCTYPE html>
<html>
<head>
<title>AI Summarizer</title>
<style>
body{
font-family: Arial;
max-width:800px;
margin:auto;
margin-top:50px;
}
textarea{
width:100%;
height:150px;
}
button{
margin-top:10px;
padding:10px 20px;
}
#result{
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>AI Text Summarizer</h1>

<textarea id="text" placeholder="Paste your text here..."></textarea>

<br>

<button onclick="summarize()">Summarize</button>

<div id="result"></div>

<script>

async function summarize(){

let text = document.getElementById("text").value;

let response = await fetch("http://127.0.0.1:8000/summarize",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
text:text
})
});

let data = await response.json();

document.getElementById("result").innerText = data.summary;

}

</script>

</body>
</html>
